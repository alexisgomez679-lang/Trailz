<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trailz</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --color-text-primary:#1a1a1a;--color-text-secondary:#555;--color-background-primary:#fff;
  --color-background-secondary:#f2f2f0;--color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);--color-border-primary:rgba(0,0,0,0.38);
  --border-radius-md:8px;--border-radius-lg:12px;--border-radius-xl:16px;
  --font-sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --color-text-primary:#f0ede8;--color-text-secondary:#aaa;--color-background-primary:#1c1c1a;
  --color-background-secondary:#252522;--color-border-tertiary:rgba(255,255,255,0.1);
  --color-border-secondary:rgba(255,255,255,0.18);--color-border-primary:rgba(255,255,255,0.32);
}}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);}
#root{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:8px 4px;}
button{font-family:inherit;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);transition:background 0.15s;}
button:hover:not(:disabled){background:var(--color-background-secondary);}
button:disabled{opacity:0.35;cursor:not-allowed;}
input{font-family:inherit;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);padding:8px 12px;outline:none;transition:border-color 0.15s;}
input:focus{border-color:var(--color-border-primary);}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.storage={
  async get(k){try{const v=localStorage.getItem('trailz:'+k);return v?{value:v}:null;}catch(e){return null;}},
  async set(k,v){try{localStorage.setItem('trailz:'+k,v);return{value:v};}catch(e){return null;}}
};
</script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

const ROWS=7,COLS=7;
function isValid(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS&&(r+c)%2===0;}
function isGDot(r,c){return isValid(r,c)&&r%2===0;}
function ck(r,c){return r+","+c;}
function pk(s){const p=s.split(",");return[parseInt(p[0]),parseInt(p[1])];}
function homeRow(pl){return pl==="green"?6:0;}
function fmt(s){return Math.floor(s/60)+":"+(s%60<10?"0":"")+(s%60);}
function isOnMap(r,c,bl){return isValid(r,c)&&!bl.has(ck(r,c));}
function pct(n,d){return d===0?"—":Math.round(n/d*100)+"%";}
function generateCode(){const ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let c="";for(let i=0;i<4;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c;}

function shroomMoves(r,c,own,pcs,bl){const dr=own==="green"?-1:1;return[[r+dr,c-1],[r+dr,c+1]].filter(d=>isOnMap(d[0],d[1],bl)&&!pcs[ck(d[0],d[1])]);}
function slugMoves(r,c,own,pcs,bl){return[[r,c+2],[r,c-2],[r+2,c],[r-2,c]].filter(d=>{const nr=d[0],nc=d[1];return isGDot(nr,nc)&&!bl.has(ck(nr,nc))&&(!pcs[ck(nr,nc)]||pcs[ck(nr,nc)].owner!==own);});}
function homeDests(player,pcs,bl){return[0,2,4,6].filter(c=>!pcs[ck(homeRow(player),c)]&&!bl.has(ck(homeRow(player),c))).map(c=>[homeRow(player),c]);}
function checkWin(pcs){for(const k in pcs){const p=pcs[k];if(!p)continue;const r=pk(k)[0];if(p.kind==="shroom"&&((p.owner==="green"&&r===0)||(p.owner==="orange"&&r===6)))return p.owner;}return null;}
function getAllMoves(pcs,res,player,bl){
  const mv=[];
  for(const k in pcs){const p=pcs[k];if(!p||p.owner!==player)continue;const pos=pk(k),r=pos[0],c=pos[1];const ds=p.kind==="shroom"?shroomMoves(r,c,player,pcs,bl):slugMoves(r,c,player,pcs,bl);for(let i=0;i<ds.length;i++)mv.push({type:"move",fromK:k,toK:ck(ds[i][0],ds[i][1]),eaten:pcs[ck(ds[i][0],ds[i][1])]||null,piece:p});}
  const dests=homeDests(player,pcs,bl);for(let j=0;j<dests.length;j++){if(res[player].shrooms>0)mv.push({type:"place",kind:"shroom",toK:ck(dests[j][0],dests[j][1])});if(res[player].slugs>0)mv.push({type:"place",kind:"slug",toK:ck(dests[j][0],dests[j][1])});}
  return mv;
}
function scoreMove(m,pl){let s=Math.random()*0.8;if(m.type==="move"){if(m.eaten)s+=m.eaten.kind==="shroom"?30:15;if(m.piece.kind==="shroom"){const fr=pk(m.fromK)[0],tr=pk(m.toK)[0];s+=(pl==="green"?fr-tr:tr-fr)*10;s+=(pl==="green"?6-tr:tr)*2;}}else s+=m.kind==="shroom"?8:4;return s;}

const MAPS={
  classic:{name:"Classic",desc:"Standard board",blocked:new Set(),bg:"#0c0900",slime:"#163d1e",myc:"#2a1004",slimeNode:"#112a16",slimeStroke:"#1d5422",mycNode:"#160a03",mycStroke:"#3d1a08",blockFill:"#1a1208",blockStroke:"#443322"},
  split:{name:"Split",desc:"Center blocked",blocked:new Set(["1,3","3,3","5,3"]),bg:"#04080e",slime:"#102038",myc:"#180810",slimeNode:"#0d1a2e",slimeStroke:"#183050",mycNode:"#100608",mycStroke:"#281020",blockFill:"#0e1828",blockStroke:"#203860"},
  fortress:{name:"Fortress",desc:"Flanks blocked",blocked:new Set(["2,0","2,6","4,0","4,6"]),bg:"#0d0500",slime:"#1a2a0e",myc:"#2c0a06",slimeNode:"#122010",slimeStroke:"#1e3818",mycNode:"#120602",mycStroke:"#301008",blockFill:"#200a06",blockStroke:"#5a2010"},
};
const INIT_PCS={[ck(6,0)]:{kind:"shroom",owner:"green"},[ck(6,4)]:{kind:"shroom",owner:"green"},[ck(6,2)]:{kind:"slug",owner:"green"},[ck(0,2)]:{kind:"shroom",owner:"orange"},[ck(0,6)]:{kind:"shroom",owner:"orange"},[ck(0,4)]:{kind:"slug",owner:"orange"}};
const INIT_RES={green:{shrooms:2,slugs:1},orange:{shrooms:2,slugs:1}};
const PC={green:{fill:"#0c3a1c",stroke:"#22c55e"},orange:{fill:"#481c00",stroke:"#f97316"}};
const DEFAULT_STATS={ai:{w:0,l:0,d:0,streak:0,best:0,moves:0},p2:{g:0,o:0,d:0,moves:0},maps:{classic:{w:0,l:0,d:0},split:{w:0,l:0,d:0},fortress:{w:0,l:0,d:0}}};

function useSound(mutedRef){
  const acRef=useRef(null);
  return useCallback(function(type,player){
    if(mutedRef.current)return;
    try{
      if(!acRef.current)acRef.current=new(window.AudioContext||window.webkitAudioContext)();
      const ac=acRef.current;if(ac.state==="suspended")ac.resume();
      const now=ac.currentTime;
      function tone(freq,wave,vol,t0,dur,f2){const osc=ac.createOscillator(),g=ac.createGain();osc.connect(g);g.connect(ac.destination);osc.type=wave;osc.frequency.setValueAtTime(freq,now+t0);if(f2)osc.frequency.exponentialRampToValueAtTime(f2,now+t0+dur);g.gain.setValueAtTime(0,now+t0);g.gain.linearRampToValueAtTime(vol,now+t0+0.015);g.gain.exponentialRampToValueAtTime(0.001,now+t0+dur);osc.start(now+t0);osc.stop(now+t0+dur+0.02);}
      const isG=player==="green";
      if(type==="move")tone(isG?500:290,"sine",0.13,0,0.09);
      else if(type==="place"){tone(isG?420:240,"triangle",0.15,0,0.1);tone(isG?630:360,"sine",0.06,0,0.12);}
      else if(type==="capture"){tone(640,"sawtooth",0.2,0,0.18,160);tone(270,"square",0.1,0,0.15);}
      else if(type==="win")[440,554,659,880].forEach((f,i)=>tone(f,"sine",0.18,i*0.1,0.3));
    }catch(e){}
  },[mutedRef]);
}

function useAmbientMusic(mutedRef){
  const audioRef=useRef(null);

  function start(){
    if(audioRef.current)return;
    try{
      const audio=new Audio("https://alexisgomez679-lang.github.io/Trailz/Under_the_Ferns.mp3");
      audio.loop=true;
      audio.volume=mutedRef.current?0:0.6;
      audioRef.current=audio;
      const playPromise=audio.play();
      if(playPromise!==undefined){
        playPromise.catch(()=>{
          // Autoplay blocked — play on next user interaction
          const resume=()=>{ audio.play(); document.removeEventListener("click",resume); document.removeEventListener("touchend",resume); };
          document.addEventListener("click",resume,{once:true});
          document.addEventListener("touchend",resume,{once:true});
        });
      }
    }catch(e){}
  }

  function stop(){
    if(!audioRef.current)return;
    audioRef.current.pause();
    audioRef.current.currentTime=0;
    audioRef.current=null;
  }

  function setMuted(m){
    if(!audioRef.current)return;
    // Smooth fade
    const audio=audioRef.current;
    const target=m?0:0.6;
    const step=m?-0.05:0.05;
    const fade=setInterval(()=>{
      const next=audio.volume+step;
      if(m&&next<=0){ audio.volume=0; clearInterval(fade); }
      else if(!m&&next>=target){ audio.volume=target; clearInterval(fade); }
      else audio.volume=Math.max(0,Math.min(1,next));
    },40);
  }

  return{start,stop,setMuted};
}

function useBoardSize(){
  function calc(){const w=window.innerWidth;const cell=Math.max(42,Math.floor((Math.min(w-24,480)-52)/6));return{cell,pad:26,bw:6*cell+52,bh:6*cell+52};}
  const[bs,set]=useState(calc);
  useEffect(()=>{const h=()=>set(calc());window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return bs;
}

function useStats(){
  const[stats,setStats]=useState(DEFAULT_STATS);
  useEffect(()=>{(async()=>{try{const r=await window.storage.get("s4");if(r)setStats(Object.assign({},DEFAULT_STATS,JSON.parse(r.value)));}catch(e){}})();},[]);
  async function save(ns){setStats(ns);try{await window.storage.set("s4",JSON.stringify(ns));}catch(e){}}
  async function resetStats(){await save(JSON.parse(JSON.stringify(DEFAULT_STATS)));}
  return[stats,save,resetStats];
}

function Confetti({width,height}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;const ctx=canvas.getContext("2d");
    const cols=["#22c55e","#f97316","#facc15","#60a5fa","#f472b6","#a78bfa","#34d399","#fb923c"];
    const ps=Array.from({length:110},()=>({x:Math.random()*width,y:Math.random()*height*0.1-20,vx:(Math.random()-0.5)*4,vy:Math.random()*2.5+0.5,col:cols[Math.floor(Math.random()*cols.length)],sz:Math.random()*7+3,rot:Math.random()*360,rv:(Math.random()-0.5)*10,rect:Math.random()>0.4}));
    const start=Date.now();let raf;
    function draw(){const el=Date.now()-start;ctx.clearRect(0,0,width,height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.rot+=p.rv;p.vx*=0.99;if(p.y>height+10){p.y=-10;p.x=Math.random()*width;p.vy=Math.random()*2+0.5;}const alpha=el<2500?1:Math.max(0,1-(el-2500)/800);ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);if(p.rect)ctx.fillRect(-p.sz/2,-p.sz*0.3,p.sz,p.sz*0.6);else{ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}ctx.restore();});if(el<3300)raf=requestAnimationFrame(draw);else ctx.clearRect(0,0,width,height);}
    raf=requestAnimationFrame(draw);return()=>cancelAnimationFrame(raf);
  },[width,height]);
  return <canvas ref={ref} width={width} height={height} style={{position:"absolute",top:0,left:0,pointerEvents:"none",zIndex:20,borderRadius:"var(--border-radius-lg)"}}/>;
}

function ThinkingDots(){return <span style={{display:"inline-flex",gap:"3px",alignItems:"center",marginLeft:"4px"}}>{[0,1,2].map(i=><span key={i} style={{width:"5px",height:"5px",borderRadius:"50%",background:PC.orange.stroke,display:"inline-block",animation:`dotPulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}</span>;}

function MuteIcon({muted}){return <svg width="14" height="14" viewBox="0 0 16 16" style={{display:"block"}}><path d="M2 5.5v5h3l4 3.5V2L5 5.5H2z" fill="currentColor"/>{muted?(<><line x1="11" y1="5" x2="15" y2="11" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/><line x1="15" y1="5" x2="11" y2="11" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></>):(<path d="M11.5 5.5c1.1.9 1.8 2.2 1.8 3.5s-.7 2.6-1.8 3.5" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>)}</svg>;}

function Piece({kind,owner,x,y,r,selected,isSliding,colorblind}){
  const{fill,stroke}=PC[owner];
  let anim="none";if(isSliding)anim="slidePiece 0.28s ease-out both";else if(selected)anim="piecePulse 0.85s ease-in-out infinite";
  const fs=Math.max(7,Math.round(r*0.4));
  const triPts=`${x},${y-r*0.5} ${x-r*0.2},${y-r*0.26} ${x+r*0.2},${y-r*0.26}`;
  return(<g style={{animation:anim,transformBox:"fill-box",transformOrigin:"center"}}>
    <circle cx={x} cy={y} r={r} fill={fill} stroke={selected?"#fff":stroke} strokeWidth={selected?2.5:2} opacity={0.95}/>
    {kind==="shroom"?(<><ellipse cx={x} cy={y-r*0.28} rx={r*0.62} ry={r*0.38} fill={stroke} opacity={0.82}/><rect x={x-r*0.2} y={y+r*0.08} width={r*0.4} height={r*0.5} rx={r*0.12} fill={stroke} opacity={0.6}/><ellipse cx={x} cy={y-r*0.28} rx={r*0.22} ry={r*0.12} fill="rgba(255,255,255,0.2)"/></>):(<><ellipse cx={x} cy={y+r*0.18} rx={r*0.62} ry={r*0.3} fill={stroke} opacity={0.66}/><line x1={x-r*0.18} y1={y-r*0.3} x2={x-r*0.38} y2={y-r*0.72} stroke={stroke} strokeWidth={1.5} strokeLinecap="round"/><line x1={x+r*0.18} y1={y-r*0.3} x2={x+r*0.38} y2={y-r*0.72} stroke={stroke} strokeWidth={1.5} strokeLinecap="round"/><circle cx={x-r*0.38} cy={y-r*0.72} r={r*0.13} fill={stroke}/><circle cx={x+r*0.38} cy={y-r*0.72} r={r*0.13} fill={stroke}/></>)}
    {colorblind&&(<g><circle cx={x} cy={y} r={r*0.6} fill="rgba(0,0,0,0.48)"/>{owner==="green"?<polygon points={triPts} fill="rgba(255,255,255,0.92)"/>:<rect x={x-r*0.16} y={y-r*0.5} width={r*0.32} height={r*0.32} rx="1" fill="rgba(255,255,255,0.92)"/>}<text x={x} y={y+r*0.2} textAnchor="middle" dominantBaseline="middle" fontSize={fs} fill="rgba(255,255,255,0.95)" fontFamily="sans-serif" fontWeight="bold">{kind==="shroom"?"S":"Sl"}</text></g>)}
  </g>);
}

function MiniPiece({kind,owner}){const{fill,stroke}=PC[owner];return <svg width="14" height="14" viewBox="0 0 14 14" style={{display:"inline-block",verticalAlign:"middle"}}><circle cx="7" cy="8.5" r="4.5" fill={fill} stroke={stroke} strokeWidth="1.5"/>{kind==="shroom"?<ellipse cx="7" cy="6.5" rx="4" ry="2.5" fill={stroke} opacity="0.85"/>:(<><line x1="5" y1="7" x2="3.5" y2="4.5" stroke={stroke} strokeWidth="1.3" strokeLinecap="round"/><line x1="9" y1="7" x2="10.5" y2="4.5" stroke={stroke} strokeWidth="1.3" strokeLinecap="round"/><circle cx="3.5" cy="4.5" r="1.2" fill={stroke}/><circle cx="10.5" cy="4.5" r="1.2" fill={stroke}/></>)}</svg>;}

function MapThumb({mapKey}){
  const map=MAPS[mapKey],S=46,sp=S/7,items=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(!isValid(r,c))continue;items.push({r,c,blk:map.blocked.has(ck(r,c))});}
  return <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{display:"block",margin:"0 auto 6px"}}><rect x="0" y="0" width={S} height={S} rx="4" fill={map.bg}/>{items.map((item,i)=>{const x=item.c*sp+sp/2,y=item.r*sp+sp/2;if(item.blk)return <g key={i}><circle cx={x} cy={y} r={sp*0.3} fill={map.blockFill} stroke={map.blockStroke} strokeWidth="0.8"/><line x1={x-sp*0.16} y1={y-sp*0.16} x2={x+sp*0.16} y2={y+sp*0.16} stroke={map.blockStroke} strokeWidth="0.7"/><line x1={x+sp*0.16} y1={y-sp*0.16} x2={x-sp*0.16} y2={y+sp*0.16} stroke={map.blockStroke} strokeWidth="0.7"/></g>;const f=item.r===6?"#22c55e55":item.r===0?"#f9731655":isGDot(item.r,item.c)?map.slimeNode+"cc":map.mycNode+"cc";return <circle key={i} cx={x} cy={y} r={sp*0.2} fill={f}/>;})}</svg>;
}

function StatBar({val,total,color}){const w=total>0?Math.round(val/total*100):0;return <div style={{height:"5px",background:"var(--color-background-secondary)",borderRadius:"3px",overflow:"hidden",marginTop:"4px"}}><div style={{height:"100%",width:w+"%",background:color,borderRadius:"3px",transition:"width 0.4s ease"}}/></div>;}

function StatsModal({stats,onReset,onClose,embedded}){
  const aiG=stats.ai.w+stats.ai.l+stats.ai.d,p2G=stats.p2.g+stats.p2.o+stats.p2.d;
  const aiAvg=aiG>0?Math.round(stats.ai.moves/aiG):0,p2Avg=p2G>0?Math.round(stats.p2.moves/p2G):0;
  const[cr,setCr]=useState(false);
  function row(label,val){return <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}><span style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>{label}</span><span style={{fontSize:"13px",fontWeight:"500"}}>{val}</span></div>;}
  const cols=[{label:"vs AI",games:aiG,a:{label:"Wins",v:stats.ai.w,c:"#22c55e"},b:{label:"Losses",v:stats.ai.l,c:"#f97316"},extras:[{label:"Win rate",v:pct(stats.ai.w,aiG)},{label:"Streak/Best",v:`${stats.ai.streak}/${stats.ai.best}`},{label:"Avg moves",v:aiAvg>0?aiAvg+"mv":"—"},{label:"Games",v:aiG}]},{label:"2 Player",games:p2G,a:{label:"Green",v:stats.p2.g,c:"#22c55e"},b:{label:"Orange",v:stats.p2.o,c:"#f97316"},extras:[{label:"Draws",v:stats.p2.d},{label:"Avg moves",v:p2Avg>0?p2Avg+"mv":"—"},{label:"Games",v:p2G}]}];
  const wrapS=embedded?{}:{position:"absolute",inset:0,background:"rgba(0,0,0,0.76)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:50,padding:"14px",borderRadius:"var(--border-radius-lg)"};
  const innerS={background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"18px",maxWidth:"320px",width:"100%",marginTop:embedded?"0":"8px",maxHeight:embedded?"none":"calc(100% - 28px)",overflowY:"auto"};
  return <div style={wrapS}><div style={innerS}>
    {!embedded&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}><span style={{fontSize:"16px",fontWeight:"500"}}>Stats</span><button onClick={onClose} style={{padding:"4px 12px",fontSize:"13px",fontWeight:"500"}}>Close</button></div>}
    <div style={{display:"flex",gap:"10px",marginBottom:"14px"}}>
      {cols.map(col=><div key={col.label} style={{flex:1,background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"10px",border:"0.5px solid var(--color-border-tertiary)"}}>
        <div style={{fontSize:"12px",fontWeight:"500",color:"var(--color-text-secondary)",marginBottom:"8px"}}>{col.label}</div>
        <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>{[col.a,col.b].map(s=><div key={s.label} style={{flex:1,textAlign:"center"}}><div style={{fontSize:"18px",fontWeight:"500",color:s.c}}>{s.v}</div><div style={{fontSize:"10px",color:"var(--color-text-secondary)"}}>{s.label}</div></div>)}</div>
        <StatBar val={col.a.v} total={col.games} color={col.a.c}/>
        <div style={{marginTop:"8px"}}>{col.extras.map(e=>row(e.label,e.v))}</div>
      </div>)}
    </div>
    <div style={{marginBottom:"14px"}}><div style={{fontSize:"12px",fontWeight:"500",color:"var(--color-text-secondary)",marginBottom:"8px"}}>By map</div>
      {Object.keys(MAPS).map(mk=>{const ms=stats.maps[mk]||{w:0,l:0,d:0},tot=ms.w+ms.l+ms.d;return <div key={mk} style={{marginBottom:"8px"}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:"12px",fontWeight:"500"}}>{MAPS[mk].name}</span><span style={{fontSize:"11px",color:"var(--color-text-secondary)"}}>{ms.w}W·{ms.l}L·{pct(ms.w,tot)}</span></div><StatBar val={ms.w} total={tot} color="#22c55e"/></div>;})}

      </div>

      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",justifyContent:"center",width:"100%",maxWidth:bw+"px"}}>
        {["shroom","slug"].map(kind=>{const active=placing===kind,count=res[turn][kind+"s"];return <button key={kind} onClick={()=>startPlace(kind)} disabled={!canAct||count<=0} style={{flex:1,padding:"11px 6px",fontSize:"13px",minWidth:"100px",background:active?ts+"1e":"transparent",border:"1px solid "+(active?ts:"var(--color-border-secondary)"),color:active?ts:"var(--color-text-primary)",fontWeight:active?"500":"400",opacity:canAct&&count>0?1:0.3}}>{`+ ${kind[0].toUpperCase()+kind.slice(1)} (${count})`}</button>;})}
        {(placing||sel)&&<button onClick={()=>{setSel(null);setHi([]);setPlacing(null);}} style={{padding:"11px 12px",fontSize:"12px",color:"var(--color-text-secondary)"}}>Cancel</button>}
        {winner&&(<>
          {mode!=="online"&&<button onClick={()=>reset(true)} style={{flex:1,padding:"11px",fontSize:"13px",fontWeight:"500"}}>Rematch</button>}
          <button onClick={handleShare} style={{flex:1,padding:"11px",fontSize:"13px",color:copied?"#22c55e":"var(--color-text-secondary)",border:"1px solid "+(copied?"#22c55e44":"var(--color-border-secondary)"),transition:"all 0.2s"}}>{copied?"Copied!":"Share"}</button>
          <button onClick={()=>reset(false)} style={{flex:1,padding:"11px",fontSize:"13px",color:"var(--color-text-secondary)"}}>Menu</button>
        </>)}
      </div>

      <div style={{display:"flex",gap:"14px",fontSize:"11px",width:"100%",maxWidth:bw+"px",justifyContent:"center"}}>
        <span style={{color:"#22c55e88"}}>{`Green: ${res.green.shrooms} sh, ${res.green.slugs} sl`}</span>
        <span style={{color:"#f9731688"}}>{`Orange: ${res.orange.shrooms} sh, ${res.orange.slugs} sl`}</span>
        <span style={{color:"var(--color-text-secondary)",opacity:0.5}}>{`Move ${moveCount}`}</span>
      </div>
      {(captured.green.length>0||captured.orange.length>0)&&<div style={{display:"flex",gap:"8px",width:"100%",maxWidth:bw+"px",justifyContent:"center",flexWrap:"wrap"}}>{[{pl:"green",lbl:(mode==="ai"||(mode==="online"&&onlineConfig?.myColor==="green"))?"You captured":"Green captured",items:captured.green},{pl:"orange",lbl:(mode==="online"&&onlineConfig?.myColor==="orange")?"You captured":"Orange captured",items:captured.orange}].map(e=>{if(e.items.length===0)return null;return <div key={e.pl} style={{display:"flex",alignItems:"center",gap:"3px",background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"4px 10px",border:"0.5px solid var(--color-border-tertiary)"}}><span style={{fontSize:"11px",color:PC[e.pl].stroke,marginRight:"4px"}}>{e.lbl+":"}</span>{e.items.map((kind,i)=><MiniPiece key={i} kind={kind} owner={e.pl==="green"?"orange":"green"}/>)}</div>;})}</div>}
      {log.length>0&&<div style={{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"7px 11px",width:"100%",maxWidth:bw+"px",border:"0.5px solid var(--color-border-tertiary)"}}>{log.map((l,i)=><div key={i} style={{fontSize:"11px",lineHeight:"1.75",color:"var(--color-text-secondary)",opacity:1-i*0.2}}>{l}</div>)}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Trailz));
</script>
</body>
</html>
